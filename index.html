<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0E141B" />
<title>دفتر حسابات العمال والمشاريع</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#0E141B;
    --ink-800:#171F29;
    --ink-700:#212B38;
    --ink-650:#283443;
    --line:#2C3846;
    --gold-500:#C9A227;
    --gold-300:#E4C766;
    --green-500:#4C9A6A;
    --green-300:#7CBE96;
    --rust-500:#B24C3E;
    --rust-300:#D08276;
    --text-100:#ECEEF2;
    --text-300:#B7BFC9;
    --text-500:#8A93A0;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at top, #131B24 0%, var(--ink-900) 55%);
    color:var(--text-100);
    font-family:'Cairo', sans-serif;
    min-height:100vh;
    padding-bottom:48px;
  }
  .mono{ font-family:'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .paper-rules{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 37px, rgba(201,162,39,0.035) 38px);
  }
  .wrap{ max-width:560px; margin:0 auto; padding:22px 18px 0; position:relative; z-index:1; }
  header{ text-align:center; padding:6px 0 22px; }
  header .eyebrow{ font-size:12px; letter-spacing:.14em; color:var(--gold-300); font-weight:700; text-transform:uppercase; }
  header h1{ margin:6px 0 0; font-size:24px; font-weight:900; color:var(--text-100); }

  .stamp{
    margin:18px auto 26px; width:184px; height:184px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background: radial-gradient(circle at 32% 28%, var(--ink-650), var(--ink-800) 70%);
    border:2px solid var(--gold-500);
    box-shadow: 0 0 0 6px rgba(201,162,39,0.08), inset 0 0 24px rgba(0,0,0,0.4);
    position:relative;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .stamp.pulse{ animation: stampHit .4s ease; }
  @keyframes stampHit{ 0%{ transform:scale(1); } 35%{ transform:scale(1.06) rotate(-1deg); } 100%{ transform:scale(1); } }
  .stamp::before{ content:""; position:absolute; inset:10px; border-radius:50%; border:1px dashed rgba(201,162,39,0.35); }
  .stamp .label{ font-size:11px; letter-spacing:.08em; color:var(--text-500); font-weight:700; }
  .stamp .amount{ font-size:26px; font-weight:700; color:var(--gold-300); margin-top:4px; }
  .stamp .unit{ font-size:11px; color:var(--text-500); margin-top:2px; }

  .tabs{ display:flex; gap:10px; margin-bottom:16px; }
  .tab-btn{ flex:1; background:var(--ink-800); border:1px solid var(--line); color:var(--text-300); padding:10px; border-radius:9px; font-family:inherit; font-weight:700; cursor:pointer; text-align:center; }
  .tab-btn.active{ background:var(--gold-500); color:#1A1305; border-color:var(--gold-500); }

  .install-row{ display:flex; justify-content:center; margin-bottom:18px; }
  .btn-install{ display:none; align-items:center; gap:8px; background:transparent; color:var(--gold-300); border:1px solid var(--gold-500); padding:8px 16px; border-radius:100px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-install.show{ display:inline-flex; }

  section.card{ background:var(--ink-800); border:1px solid var(--line); border-radius:var(--radius); padding:16px 16px 18px; margin-bottom:16px; }
  .card h2{ margin:0 0 12px; font-size:15px; font-weight:700; color:var(--text-100); }
  .field{ margin-bottom:10px; }
  .field label{ display:block; font-size:12px; color:var(--text-500); margin-bottom:5px; font-weight:600; }
  .field input, .field select{ width:100%; background:var(--ink-700); border:1px solid var(--line); color:var(--text-100); border-radius:9px; padding:10px 12px; font-family:inherit; font-size:14px; }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--gold-500); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn-primary{ width:100%; background:var(--gold-500); color:#1A1305; border:none; border-radius:9px; padding:11px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; margin-top:4px; }
  
  .empty{ text-align:center; color:var(--text-500); font-size:13px; padding:30px 10px; }
  .empty .glyph{ font-size:30px; display:block; margin-bottom:8px; opacity:.6; }

  .item-box{ background:var(--ink-800); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
  .item-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; gap:10px; }
  .avatar{ width:36px; height:36px; border-radius:50%; background:var(--ink-650); display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--gold-300); flex-shrink:0; border:1px solid var(--line); }
  .who-text{ min-width:0; flex:1; }
  .who-text .name{ font-weight:700; font-size:14.5px; color:var(--text-100); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .who-text .subtext{ font-size:11.5px; color:var(--text-500); margin-top:1px; }
  
  .bal{ text-align:left; flex-shrink:0; }
  .bal .num{ font-size:15px; font-weight:700; }
  .bal .num.owed{ color:var(--green-300); }
  .bal .num.debt{ color:var(--rust-300); }
  .bal .cap{ font-size:10px; color:var(--text-500); }
  .chev{ color:var(--text-500); font-size:12px; transition: transform .2s ease; margin-inline-start:4px; }
  .item-box.open .chev{ transform: rotate(180deg); }
  .item-body{ display:none; border-top:1px solid var(--line); padding:14px 16px 16px; }
  .item-box.open .item-body{ display:block; }

  .ledger-lines{ margin-bottom:12px; }
  .lline{ display:flex; align-items:baseline; gap:8px; padding:7px 0; border-bottom:1px dotted rgba(140,150,163,0.25); font-size:13px; }
  .lline:last-child{ border-bottom:none; }
  .lline .ltype{ flex-shrink:0; font-size:11px; padding:2px 8px; border-radius:100px; font-weight:700; }
  .ltype.earn{ background:rgba(76,154,106,0.15); color:var(--green-300); }
  .ltype.advance{ background:rgba(201,162,39,0.15); color:var(--gold-300); }
  .ltype.payment{ background:rgba(178,76,62,0.15); color:var(--rust-300); }
  .lline .lnote{ flex:1; color:var(--text-300); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lline .ldate{ color:var(--text-500); font-size:10.5px; flex-shrink:0; }
  .lline .lamt{ flex-shrink:0; font-weight:700; }
  .lamt.plus{ color:var(--green-300); }
  .lamt.minus{ color:var(--rust-300); }
  .lline .ldel{ background:none; border:none; color:var(--text-500); cursor:pointer; font-size:14px; padding:0 2px; flex-shrink:0; }

  .entry-form{ background:var(--ink-700); border-radius:11px; padding:12px; }
  .entry-form .row3{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .entry-form .btn-add-entry{ width:100%; background:var(--ink-650); border:1px solid var(--gold-500); color:var(--gold-300); border-radius:8px; padding:9px; font-family:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .item-actions{ display:flex; justify-content:flex-end; margin-top:10px; }
  .btn-remove{ background:none; border:none; color:var(--text-500); font-size:12px; cursor:pointer; text-decoration:underline; padding:2px; }

  /* Projects checklist UI */
  .workers-check-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 120px; overflow-y: auto; background: var(--ink-700); padding: 8px; border-radius: 9px; border: 1px solid var(--line); }
  .check-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-300); cursor: pointer; }
  .project-workers-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .worker-tag { background: var(--ink-700); border: 1px solid var(--line); color: var(--gold-300); padding: 2px 8px; border-radius: 100px; font-size: 11px; }

  footer{ text-align:center; color:var(--text-500); font-size:11px; padding:24px 0 6px; }
</style>
</head>
<body>
<div class="paper-rules"></div>
<div class="wrap">

  <header>
    <div class="eyebrow">دفتر المهندس الرئيسي</div>
    <h1>حسابات العمال والمشاريع</h1>
  </header>

  <div class="stamp" id="stamp">
    <div class="label" id="stampLabel">صافي إجمالي المستحقات</div>
    <div class="amount mono" id="totalAmount">٠</div>
    <div class="unit">جنيه</div>
  </div>

  <div class="install-row">
    <button class="btn-install" id="installBtn">⭳ ثبّت التطبيق على الموبايل</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabWorkers" onclick="switchTab('workers')">👷 العمال والحسابات</button>
    <button class="tab-btn" id="tabProjects" onclick="switchTab('projects')">🏗️ إدارة المشاريع</button>
  </div>

  <div id="viewWorkers">
    <section class="card">
      <h2>إضافة عامل جديد</h2>
      <div class="row2">
        <div class="field">
          <label>اسم العامل</label>
          <input type="text" id="workerName" placeholder="مثال: محمد أحمد" />
        </div>
        <div class="field">
          <label>الأجر اليومي (اختياري)</label>
          <input type="number" id="workerRate" placeholder="مثال: 300" inputmode="decimal" />
        </div>
      </div>
      <button class="btn-primary" id="addWorkerBtn">إضافة العامل</button>
    </section>
    <div id="workersList"></div>
    <div class="empty" id="workersEmptyState" style="display:none;">
      <span class="glyph">👷</span>لسه مفيش عمال مضافين — ابدأ بإضافة عامل من فوق.
    </div>
  </div>

  <div id="viewProjects" style="display:none;">
    <section class="card">
      <h2>إضافة مشروع جديد</h2>
      <div class="field">
        <label>اسم المشروع</label>
        <input type="text" id="projectName" placeholder="مثال: مشروع فيلا التجمع" />
      </div>
      <div class="field">
        <label>تعيين العمال للمشروع</label>
        <div class="workers-check-list" id="projectWorkersChecklist">
          </div>
      </div>
      <button class="btn-primary" id="addProjectBtn">إضافة المشروع</button>
    </section>
    <div id="projectsList"></div>
    <div class="empty" id="projectsEmptyState" style="display:none;">
      <span class="glyph">🏗️</span>لسه مفيش مشاريع مضافة — ضيف مشروعك الأول وحدد عماله.
    </div>
  </div>

  <footer>البيانات محفوظة بالكامل على جهازك وآمنة</footer>
</div>

<script>
(function(){
  const STORAGE_KEY = "ledgerData_v2";
  let data = load();
  let currentTab = 'workers';

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : { workers: [], projects: [] };
      if(!parsed.projects) parsed.projects = [];
      return parsed;
    }catch(e){ return { workers: [], projects: [] }; }
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  
  function fmt(n){
    return Math.abs(n).toLocaleString('en-US', {maximumFractionDigits:0});
  }
  function todayStr(){
    const d = new Date();
    return d.toLocaleDateString('ar-EG', {day:'numeric', month:'short'});
  }

  function balanceOf(worker){
    return worker.entries.reduce((sum, e) => {
      if(e.type === 'earn') return sum + e.amount;
      return sum - e.amount; // سلفة أو دفعة بيتخصموا
    }, 0);
  }

  window.switchTab = function(tab) {
    currentTab = tab;
    document.getElementById('tabWorkers').classList.toggle('active', tab === 'workers');
    document.getElementById('tabProjects').classList.toggle('active', tab === 'projects');
    document.getElementById('viewWorkers').style.display = tab === 'workers' ? 'block' : 'none';
    document.getElementById('viewProjects').style.display = tab === 'projects' ? 'block' : 'none';
    render();
  };

  const typeLabels = { earn: 'استحقاق', advance: 'سلفة', payment: 'دفعة' };

  function render(){
    // --- 1. RENDER WORKERS TAB ---
    const wList = document.getElementById('workersList');
    const wEmpty = document.getElementById('workersEmptyState');
    wList.innerHTML = '';
    
    let totalOwed = 0; 
    
    if(data.workers.length === 0){
      wEmpty.style.display = 'block';
    } else {
      wEmpty.style.display = 'none';
    }

    data.workers.forEach(worker => {
      const bal = balanceOf(worker);
      totalOwed += bal; // بيجمع ويطرح الصافي تلقائياً

      const el = document.createElement('div');
      el.className = 'item-box' + (worker._open ? ' open' : '');

      const initials = worker.name.trim().slice(0,1) || '?';
      
      let balClass = 'owed';
      let balText = 'متسوّى';
      let capText = 'حساب مصفّي';

      if (bal > 0) {
        balClass = 'owed';
        balText = fmt(bal) + ' ج';
        capText = 'مستحق له (لينا فلوس)';
      } else if (bal < 0) {
        balClass = 'debt';
        balText = fmt(bal) + ' ج';
        capText = 'عليه سلفة / دفعة بزيادة';
      }

      el.innerHTML = `
        <div class="item-head worker-head" data-id="${worker.id}">
          <div class="who">
            <div class="avatar">${initials}</div>
            <div class="who-text">
              <div class="name">${escapeHtml(worker.name)}</div>
              <div class="subtext">${worker.rate ? 'أجر يومي: ' + fmt(worker.rate) + ' ج' : 'بدون أجر ثابت'}</div>
            </div>
          </div>
          <div style="display:flex; align-items:center;">
            <div class="bal">
              <div class="num mono ${balClass}">${balText}</div>
              <div class="cap">${capText}</div>
            </div>
            <span class="chev">▾</span>
          </div>
        </div>
        <div class="item-body">
          <div class="ledger-lines">
            ${worker.entries.length === 0
              ? '<div class="no-entries">لا توجد حركات مسجلة بعد</div>'
              : worker.entries.slice().reverse().map(e => `
                <div class="lline">
                  <span class="ltype ${e.type}">${typeLabels[e.type]}</span>
                  <span class="lnote">${escapeHtml(e.note || '')}</span>
                  <span class="ldate">${e.date}</span>
                  <span class="lamt mono ${e.type === 'earn' ? 'plus' : 'minus'}">${e.type === 'earn' ? '+' : '-'}${fmt(e.amount)}</span>
                  <button class="ldel" data-worker="${worker.id}" data-entry="${e.id}">✕</button>
                </div>
              `).join('')
            }
          </div>
          <div class="entry-form">
            <div class="row3">
              <select id="type-${worker.id}">
                <option value="earn">استحقاق (شغل)</option>
                <option value="advance">سلفة (عليه)</option>
                <option value="payment">دفعة / تسديد</option>
              </select>
              <input type="number" id="amt-${worker.id}" placeholder="المبلغ" inputmode="decimal" />
            </div>
            <div class="field" style="margin-bottom:8px;">
              <input type="text" id="note-${worker.id}" placeholder="ملاحظة (اختياري)" />
            </div>
            <button class="btn-add-entry" data-id="${worker.id}">إضافة الحركة</button>
          </div>
          <div class="item-actions">
            <button class="btn-remove btn-remove-worker" data-id="${worker.id}">حذف العامل نهائيًا</button>
          </div>
        </div>
      `;
      wList.appendChild(el);
    });

    // تحديث رقم الختم الكلي
    const totalAmountEl = document.getElementById('totalAmount');
    const stampLabelEl = document.getElementById('stampLabel');
    if(totalOwed >= 0) {
      totalAmountEl.textContent = fmt(totalOwed);
      stampLabelEl.textContent = "صافي إجمالي المطلوبة للعمال";
      totalAmountEl.style.color = "var(--gold-300)";
    } else {
      totalAmountEl.textContent = fmt(totalOwed);
      stampLabelEl.textContent = "إجمالي السلف الزيادة (برا الدفتر)";
      totalAmountEl.style.color = "var(--rust-300)";
    }

    // --- 2. RENDER PROJECTS TAB ---
    const pList = document.getElementById('projectsList');
    const pEmpty = document.getElementById('projectsEmptyState');
    const checklistContainer = document.getElementById('projectWorkersChecklist');
    
    pList.innerHTML = '';
    checklistContainer.innerHTML = '';

    // ملء قائمة تشيك بوكس العمال أثناء إضافة المشروع
    if(data.workers.length === 0) {
      checklistContainer.innerHTML = '<div style="font-size:12px;color:var(--text-500)">ضيف عمال الأول عشان تظهر هنا</div>';
    } else {
      data.workers.forEach(w => {
        checklistContainer.innerHTML += `
          <label class="check-item">
            <input type="checkbox" name="projectWorkers" value="${w.id}">
            <span>${escapeHtml(w.name)}</span>
          </label>
        `;
      });
    }

    if(data.projects.length === 0){
      pEmpty.style.display = 'block';
    } else {
      pEmpty.style.display = 'none';
    }

    data.projects.forEach(project => {
      const el = document.createElement('div');
      el.className = 'item-box' + (project._open ? ' open' : '');

      const assignedWorkers = data.workers.filter(w => project.workerIds && project.workerIds.includes(w.id));

      el.innerHTML = `
        <div class="item-head project-head" data-id="${project.id}">
          <div class="who">
            <div class="avatar">🏗️</div>
            <div class="who-text">
              <div class="name">${escapeHtml(project.name)}</div>
              <div class="subtext">عدد العمال المسؤولين: ${assignedWorkers.length}</div>
            </div>
          </div>
          <span class="chev">▾</span>
        </div>
        <div class="item-body">
          <div style="font-size:13px; font-weight:700; margin-bottom:6px;">العمال الشغالين في المشروع ده:</div>
          <div class="project-workers-tags">
            ${assignedWorkers.length === 0 
              ? '<span style="font-size:12px;color:var(--text-500)">لم يتم تعيين عمال للمشروع بعد</span>'
              : assignedWorkers.map(w => `<span class="worker-tag">${escapeHtml(w.name)} (صافي: ${balanceOf(w)} ج)</span>`).join('')
            }
          </div>
          <div class="item-actions" style="margin-top:15px;">
            <button class="btn-remove btn-remove-project" data-id="${project.id}">حذف المشروع</button>
          </div>
        </div>
      `;
      pList.appendChild(el);
    });

    // --- BIND ALL EVENTS ---
    wList.querySelectorAll('.worker-head').forEach(h => {
      h.addEventListener('click', () => {
        const w = data.workers.find(w => w.id === h.dataset.id);
        w._open = !w._open;
        render();
      });
    });

    pList.querySelectorAll('.project-head').forEach(h => {
      h.addEventListener('click', () => {
        const p = data.projects.find(p => p.id === h.dataset.id);
        p._open = !p._open;
        render();
      });
    });

    wList.querySelectorAll('.btn-add-entry').forEach(b => {
      b.addEventListener('click', (ev) => { ev.stopPropagation(); addEntry(b.dataset.id); });
    });

    wList.querySelectorAll('.ldel').forEach(b => {
      b.addEventListener('click', (ev) => { ev.stopPropagation(); removeEntry(b.dataset.worker, b.dataset.entry); });
    });

    wList.querySelectorAll('.btn-remove-worker').forEach(b => {
      b.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if(confirm('هل أنت متأكد من حذف العامل ده وكل سجلاته؟')){
          data.workers = data.workers.filter(w => w.id !== b.dataset.id);
          // حذف العامل من المشاريع المعين فيها أيضاً
          data.projects.forEach(p => {
            if(p.workerIds) p.workerIds = p.workerIds.filter(id => id !== b.dataset.id);
          });
          save(); render();
        }
      });
    });

    pList.querySelectorAll('.btn-remove-project').forEach(b => {
      b.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if(confirm('عايز تحذف المشروع ده؟')){
          data.projects = data.projects.filter(p => p.id !== b.dataset.id);
          save(); render();
        }
      });
    });

    pulseStamp();
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function pulseStamp(){
    const s = document.getElementById('stamp');
    s.classList.remove('pulse');
    void s.offsetWidth;
    s.classList.add('pulse');
  }

  function addEntry(workerId){
    const amtInput = document.getElementById('amt-' + workerId);
    const typeInput = document.getElementById('type-' + workerId);
    const noteInput = document.getElementById('note-' + workerId);
    const amount = parseFloat(amtInput.value);
    if(!amount || amount <= 0){ amtInput.focus(); return; }

    const worker = data.workers.find(w => w.id === workerId);
    worker.entries.push({
      id: uid(),
      type: typeInput.value,
      amount: amount,
      note: noteInput.value.trim(),
      date: todayStr()
    });
    worker._open = true;
    save();
    render();
  }

  function removeEntry(workerId, entryId){
    const worker = data.workers.find(w => w.id === workerId);
    worker.entries = worker.entries.filter(e => e.id !== entryId);
    worker._open = true;
    save();
    render();
  }

  document.getElementById('addWorkerBtn').addEventListener('click', () => {
    const nameInput = document.getElementById('workerName');
    const rateInput = document.getElementById('workerRate');
    const name = nameInput.value.trim();
    if(!name){ nameInput.focus(); return; }
    data.workers.push({
      id: uid(),
      name: name,
      rate: rateInput.value ? parseFloat(rateInput.value) : 0,
      entries: [],
      _open: true
    });
    nameInput.value = ''; rateInput.value = '';
    save();
    render();
  });

  document.getElementById('addProjectBtn').addEventListener('click', () => {
    const pNameInput = document.getElementById('projectName');
    const name = pNameInput.value.trim();
    if(!name){ pNameInput.focus(); return; }

    const checkboxes = document.querySelectorAll('input[name="projectWorkers"]:checked');
    const workerIds = Array.from(checkboxes).map(cb => cb.value);

    data.projects.push({
      id: uid(),
      name: name,
      workerIds: workerIds,
      _open: true
    });

    pNameInput.value = '';
    save();
    render();
  });

  render();

  // PWA Prompt code
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('show');
  });
  installBtn.addEventListener('click', async () => {
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.classList.remove('show');
  });

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
